<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">s
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snakseh Games</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #eee;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: #00ff88;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
    }

    .info {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      font-size: 1.2rem;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .stat-label {
      color: #00ff88;
    }

    .stat-value {
      font-weight: bold;
      font-size: 1.5rem;
      color: #fff;
    }

    #gameBoard {
      border: 3px solid #00ff88;
      background-color: #0f3460;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.2), inset 0 0 10px rgba(0, 0, 0, 0.5);
      margin: 0 auto 1.5rem;
      image-rendering: pixelated;
      display: inline-block;
    }

    .controls {
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background-color: #00ff88;
      color: #0f3460;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
    }

    button:hover {
      background-color: #00dd77;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
    }

    button:active {
      transform: translateY(0);
    }

    .instructions {
      color: #aaa;
      font-size: 0.95rem;
      margin-top: 1.5rem;
      line-height: 1.6;
    }

    .game-over {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(15, 52, 96, 0.95);
      border: 3px solid #00ff88;
      padding: 2rem;
      border-radius: 10px;
      text-align: center;
      z-index: 1000;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
    }

    .game-over.show {
      display: block;
    }

    .game-over h2 {
      font-size: 2rem;
      color: #ff4444;
      margin-bottom: 1rem;
    }

    .game-over p {
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
      color: #00ff88;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 999;
    }

    .overlay.show {
      display: block;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      #gameBoard {
        max-width: 90vw;
        max-height: 90vw;
      }

      .info {
        gap: 1rem;
        font-size: 1rem;
      }

      .instructions {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="game-over" id="gameOverModal">
    <h2>Game Over!</h2>
    <p>Final Score: <span id="finalScore">0</span></p>
    <button onclick="resetGame()">Play Again</button>
  </div>

  <div class="container">
    <h1>🐍 SNAKE</h1>

    <div class="info">
      <div class="stat">
        <span class="stat-label">Score:</span>
        <span class="stat-value" id="score">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Level:</span>
        <span class="stat-value" id="level">1</span>
      </div>
    </div>

    <canvas id="gameBoard" width="400" height="400"></canvas>

    <div class="controls">
      <button onclick="togglePause()" id="pauseBtn">Pause</button>
      <button onclick="resetGame()">New Game</button>
    </div>

    <div class="instructions">
      <p><strong>Controls:</strong> Arrow Keys or WASD to move</p>
      <p>Eat food to grow and earn points. Don't hit walls or yourself!</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameBoard');
    const ctx = canvas.getContext('2d');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [{ x: 10, y: 10 }];
    let food = { x: 15, y: 15 };
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let score = 0;
    let level = 1;
    let gameRunning = true;
    let gamePaused = false;
    let gameOver = false;
    let lastRenderTime = 0;
    let gameSpeed = 100;

    function spawnFood() {
      let newFood;
      let foodOnSnake = true;

      while (foodOnSnake) {
        newFood = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
        foodOnSnake = snake.some(segment => segment.x === newFood.x && segment.y === newFood.y);
      }
      return newFood;
    }

    function update() {
      if (!gameRunning || gamePaused || gameOver) return;

      direction = nextDirection;
      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

      // Wrapping (optional - comment out for wall collision)
      head.x = (head.x + tileCount) % tileCount;
      head.y = (head.y + tileCount) % tileCount;

      // Check collision with self
      if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        endGame();
        return;
      }

      snake.unshift(head);

      // Check collision with food
      if (head.x === food.x && head.y === food.y) {
        score += 10 * level;
        level = Math.floor(score / 100) + 1;
        gameSpeed = Math.max(60, 100 - (level - 1) * 10);
        food = spawnFood();
        document.getElementById('score').textContent = score;
        document.getElementById('level').textContent = level;
      } else {
        snake.pop();
      }
    }

    function draw() {
      // Clear canvas
      ctx.fillStyle = '#0f3460';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw snake
      snake.forEach((segment, index) => {
        if (index === 0) {
          // Head
          ctx.fillStyle = '#00ff88';
          ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
          // Eyes
          ctx.fillStyle = '#0f3460';
          const eyeSize = 2;
          const eyeOffset = 4;
          ctx.fillRect(segment.x * gridSize + eyeOffset, segment.y * gridSize + eyeOffset, eyeSize, eyeSize);
          ctx.fillRect(segment.x * gridSize + gridSize - eyeOffset - eyeSize, segment.y * gridSize + eyeOffset, eyeSize, eyeSize);
        } else {
          // Body
          ctx.fillStyle = index === snake.length - 1 ? '#00cc77' : '#00dd88';
          ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
        }
      });

      // Draw food
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Draw border
      ctx.strokeStyle = '#00ff88';
      ctx.lineWidth = 2;
      ctx.strokeRect(0, 0, canvas.width, canvas.height);
    }

    function gameLoop(currentTime) {
      const deltaTime = currentTime - lastRenderTime;

      if (deltaTime > gameSpeed) {
        update();
        lastRenderTime = currentTime;
      }

      draw();
      requestAnimationFrame(gameLoop);
    }

    function endGame() {
      gameOver = true;
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOverModal').classList.add('show');
      document.getElementById('overlay').classList.add('show');
    }

    function resetGame() {
      snake = [{ x: 10, y: 10 }];
      food = spawnFood();
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      level = 1;
      gameSpeed = 100;
      gamePaused = false;
      gameOver = false;
      gameRunning = true;
      document.getElementById('score').textContent = score;
      document.getElementById('level').textContent = level;
      document.getElementById('pauseBtn').textContent = 'Pause';
      document.getElementById('gameOverModal').classList.remove('show');
      document.getElementById('overlay').classList.remove('show');
    }

    function togglePause() {
      if (gameOver) return;
      gamePaused = !gamePaused;
      document.getElementById('pauseBtn').textContent = gamePaused ? 'Resume' : 'Pause';
    }

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'arrowup' || key === 'w') {
        if (direction.y === 0) nextDirection = { x: 0, y: -1 };
        e.preventDefault();
      } else if (key === 'arrowdown' || key === 's') {
        if (direction.y === 0) nextDirection = { x: 0, y: 1 };
        e.preventDefault();
      } else if (key === 'arrowleft' || key === 'a') {
        if (direction.x === 0) nextDirection = { x: -1, y: 0 };
        e.preventDefault();
      } else if (key === 'arrowright' || key === 'd') {
        if (direction.x === 0) nextDirection = { x: 1, y: 0 };
        e.preventDefault();
      } else if (key === ' ') {
        togglePause();
        e.preventDefault();
      }
    });

    // Start the game
    resetGame();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
